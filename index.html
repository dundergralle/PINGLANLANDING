<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>DITT NAMN HÄR</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { height: 100%; }

  @keyframes slideDown {
    0%   { transform: translateY(0); }
    100% { transform: translateY(-50%); }
  }

  .bg-track {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
    display: flex;
  }

  .bg-col {
    overflow: hidden;
    flex-shrink: 0;
  }
  .bg-col--left  { width: 58%; }
  .bg-col--right { width: 42%; }

  .bg-strip {
    display: flex;
    flex-direction: column;
    width: 100%;
  }
  .bg-strip--left  { animation: slideDown 28s linear infinite; }
  .bg-strip--right { animation: slideDown 40s linear infinite; }

  .bg-strip img {
    width: 100%;
    height: 100vh;
    object-fit: cover;
    object-position: center top;
    display: block;
    flex-shrink: 0;
  }

  .overlay {
    position: fixed;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(0,0,0,0.25) 0%,
      rgba(0,0,0,0.45) 50%,
      rgba(0,0,0,0.25) 100%
    );
    z-index: 1;
  }

  body {
    min-height: 100%;
    min-height: 100dvh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    text-size-adjust: 100%;
    -webkit-text-size-adjust: 100%;
  }

  .content {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    padding: 2rem 1.5rem;
    padding-top: max(2rem, env(safe-area-inset-top));
    padding-bottom: max(2rem, env(safe-area-inset-bottom));
    padding-left: max(1.5rem, env(safe-area-inset-left));
    padding-right: max(1.5rem, env(safe-area-inset-right));
  }

  .avatar {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    object-fit: cover;
    margin-bottom: 1rem;
    border: 2.5px solid rgba(255,255,255,0.8);
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }

  h1 {
    font-size: 1.5rem;
    font-weight: 600;
    color: #fff;
    margin-bottom: 0.35rem;
    letter-spacing: -0.01em;
    text-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }

  .tagline {
    font-size: 0.9rem;
    color: rgba(255,255,255,0.85);
    margin-bottom: 0.75rem;
    text-align: center;
    line-height: 1.4;
    text-shadow: 0 1px 4px rgba(0,0,0,0.4);
  }

  .location-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.18);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 0.78rem;
    color: rgba(255,255,255,0.95);
    margin-bottom: 1.75rem;
    min-height: 32px;
    border: 1px solid rgba(255,255,255,0.25);
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #22c55e;
    flex-shrink: 0;
    animation: pulse 2s infinite;
  }

  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  .buttons {
    display: flex;
    flex-direction: column;
    gap: 0.65rem;
    width: 100%;
    max-width: 340px;
  }

  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    min-height: 52px;
    padding: 0 1rem;
    border-radius: 50px;
    background: rgba(255,255,255,0.18);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    color: #fff;
    font-size: 1rem;
    font-weight: 500;
    text-align: center;
    text-decoration: none;
    border: 1px solid rgba(255,255,255,0.3);
    cursor: pointer;
    touch-action: manipulation;
    user-select: none;
    -webkit-user-select: none;
    transition: background 0.15s, border-color 0.15s;
    text-shadow: 0 1px 3px rgba(0,0,0,0.3);
  }

  .btn:active { background: rgba(255,255,255,0.28); }
  @media (hover: hover) { .btn:hover { background: rgba(255,255,255,0.28); border-color: rgba(255,255,255,0.5); } }
</style>
</head>
<body>

<script>
if (window.location.pathname === '/link') {
  window.location.replace('https://www.youtube.com/watch?v=QxYQeQtkYtM');
}
</script>

<!-- Animated background -->
<div class="bg-track">
  <div class="bg-col bg-col--left">
    <div class="bg-strip bg-strip--left" id="strip-left"></div>
  </div>
  <div class="bg-col bg-col--right">
    <div class="bg-strip bg-strip--right" id="strip-right"></div>
  </div>
</div>
<div class="overlay"></div>

<!-- Content -->
<div class="content">
  <img class="avatar" src="YOUR_PROFILE_IMAGE_URL_HERE" alt="Profile" onerror="this.style.background='rgba(255,255,255,0.3)';this.removeAttribute('src')">

  <h1>DITT NAMN HÄR</h1>
  <p class="tagline">DIN BESKRIVNING HÄR</p>

  <div class="location-pill">
    <span class="dot"></span>
    <span id="loc-text">5 minutes ago in: ...</span>
  </div>

  <div class="buttons">
    <a class="btn" href="/link" target="_blank">Knapp 1</a>
    <a class="btn" href="YOUR_URL_2_HERE" target="_blank">Knapp 2</a>
    <a class="btn" href="YOUR_URL_3_HERE" target="_blank">Knapp 3</a>
  </div>
</div>

<script>
// Inject background images into both columns
(function() {
  var imgSrc = 'https://raw.githubusercontent.com/DITT-NAMN/DITT-REPO/main/photo.jpg';
  ['strip-left', 'strip-right'].forEach(function(id) {
    var strip = document.getElementById(id);
    for (var i = 0; i < 4; i++) {
      var img = document.createElement('img');
      img.src = imgSrc;
      img.alt = '';
      strip.appendChild(img);
    }
  });
})();

// Geolocation fallback
(function() {
  var fallbacks = [
    "Stockholm","Göteborg","Malmö","Uppsala","Linköping","Örebro","Västerås",
    "Helsingborg","Norrköping","Jönköping","Umeå","Lund","Gävle","Borås","Sundsvall",
    "Oslo","Bergen","Trondheim","Stavanger","Drammen","Kristiansand","Tromsø","Ålesund",
    "København","Aarhus","Odense","Aalborg","Esbjerg","Randers","Kolding","Vejle",
    "Helsinki","Espoo","Tampere","Vantaa","Oulu","Turku","Jyväskylä","Lahti"
  ];
  function setCity(city) {
    var c = (city && city.trim().length > 1) ? city.trim() : fallbacks[Math.floor(Math.random() * fallbacks.length)];
    document.getElementById('loc-text').textContent = '5 minutes ago in: ' + c;
  }
  function get(url, extract) {
    return fetch(url, { cache: 'no-store' }).then(function(r) { return r.json(); }).then(function(d) {
      var v = extract(d);
      if (!v || v.trim().length < 2) throw new Error('no city');
      return v;
    });
  }
  get('https://ipinfo.io/json', function(d) { return d && d.city; })
    .catch(function() { return get('https://ip-api.com/json/?fields=city,regionName', function(d) { return d && (d.city || d.regionName); }); })
    .catch(function() { return get('https://ipapi.co/json/', function(d) { return d && (d.city || d.region); }); })
    .then(function(city) { setCity(city); })
    .catch(function() { setCity(null); });
})();
</script>

</body>
</html>
